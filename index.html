<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate 16-Asset Live Dashboard</title>
    <style>
        /* Global Dashboard Styles */
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f111a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #2a2e39;
            padding-bottom: 20px;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            color: #26a69a;
        }

        .header p {
            margin: 0;
            color: #787b86;
        }

        /* Responsive Grid System */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1920px;
            margin: 0 auto;
        }

        /* Individual Chart Card */
        .chart-card {
            height: 450px; 
            background-color: #131722;
            border: 1px solid #2a2e39;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.4);
        }

        @media (max-width: 500px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            .chart-card {
                height: 350px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Global Equities & Synthetics Dashboard</h1>
        <p>Synchronized live tracking for 16 major assets and perpetual contracts</p>
    </div>

    <!-- Grid Container -->
    <div class="grid-container" id="dashboard-grid"></div>

    <!-- TradingView Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const customWatchlist = [
            { id: "tv_samsung_usdt", symbol: "BINANCE:SAMSUNGUSDT.P", tz: "Etc/UTC" },
            { id: "tv_tesla", symbol: "NASDAQ:TSLA", tz: "America/New_York" },
            { id: "tv_spacex_usdt", symbol: "BINANCE:SPCXUSDT.P", tz: "Etc/UTC" },
            { id: "tv_toyota", symbol: "NYSE:TM", tz: "America/New_York" },
            { id: "tv_byd_otc", symbol: "OTC:BYDDY", tz: "America/New_York" }, // BYD OTC ADR
            { id: "tv_alibaba", symbol: "NYSE:BABA", tz: "America/New_York" },
            { id: "tv_sony", symbol: "NYSE:SONY", tz: "America/New_York" },
            { id: "tv_honda", symbol: "NYSE:HMC", tz: "America/New_York" },
            { id: "tv_hyundai_usdt", symbol: "BINANCE:HYUNDAIUSDT.P", tz: "Etc/UTC" },
            { id: "tv_mufg", symbol: "TSE:8306", tz: "Asia/Tokyo" }, // Mitsubishi UFJ
            { id: "tv_softbank", symbol: "TSE:9984", tz: "Asia/Tokyo" },
            { id: "tv_kb_financial", symbol: "KRX:105560", tz: "Asia/Seoul" },
            { id: "tv_lg", symbol: "KRX:066570", tz: "Asia/Seoul" }, // LG Electronics
            { id: "tv_panasonic", symbol: "TSE:6752", tz: "Asia/Tokyo" },
            { id: "tv_kia", symbol: "KRX:000270", tz: "Asia/Seoul" },
            { id: "tv_tokyo_electron", symbol: "TSE:8035", tz: "Asia/Tokyo" }
        ];

        const grid = document.getElementById("dashboard-grid");

        customWatchlist.forEach(asset => {
            const card = document.createElement("div");
            card.className = "chart-card";
            card.id = asset.id;
            grid.appendChild(card);

            new TradingView.widget({
                "autosize": true,
                "symbol": asset.symbol,
                "interval": "15", 
                "timezone": asset.tz,
                "theme": "dark",
                "style": "1", 
                "locale": "en",
                "enable_publishing": false,
                "backgroundColor": "#131722",
                "gridColor": "#1f2933",
                "hide_top_toolbar": false, 
                "hide_legend": false,
                "save_image": false,
                "container_id": asset.id
            });
        });
    </script>
</body>
</html>
